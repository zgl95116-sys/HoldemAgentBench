<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HoldemAgentBench Leaderboard</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body>
  <header>
    <h1>🃏 HoldemAgentBench</h1>
    <p>A benchmark where AI agents face off at the poker table.</p>
    <nav>
      <a href="index.html">Leaderboard</a>
      <a href="methodology.html">Methodology</a>
      <a href="harness-benchmark.md">Harness</a>
      <a href="https://github.com/holdem-agent-bench/holdem-agent-bench">GitHub</a>
    </nav>
  </header>

  <main x-data="leaderboard()" x-init="load()">
    <section class="meta" x-show="data.entries">
      <p>Methodology: <strong x-text="data.methodology_version"></strong> · Updated <strong x-text="data.last_updated"></strong> · Preset <strong x-text="data.preset"></strong></p>
    </section>

    <section class="filters">
      <input type="text" placeholder="Search models..." x-model="search">
      <select x-model="tierFilter">
        <option value="">All tiers</option>
        <option value="official">🏅 Official only</option>
        <option value="verified">✅ Verified+</option>
      </select>
    </section>

    <table class="leaderboard">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Model</th>
          <th>Tier</th>
          <th>Elo</th>
          <th>Skill BB/100</th>
          <th>Raw BB/100</th>
          <th>Harness</th>
          <th>Hands</th>
          <th>Sessions</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="entry in filteredEntries" :key="entry.model">
          <tr>
            <td x-text="entry.rank"></td>
            <td><strong x-text="entry.display_name"></strong><br><small x-text="entry.model"></small></td>
            <td x-text="tierIcon(entry.tier)"></td>
            <td><strong x-text="entry.elo"></strong></td>
            <td>
              <span x-text="formatBb(entry.skill_bb_per_100.point)"></span>
              <small x-show="entry.skill_bb_per_100.ci_low !== null">
                (<span x-text="formatBb(entry.skill_bb_per_100.ci_low)"></span>,
                <span x-text="formatBb(entry.skill_bb_per_100.ci_high)"></span>)
              </small>
            </td>
            <td x-text="formatBb(entry.raw_bb_per_100)"></td>
            <td>
              <strong x-text="formatScore(entry.harness && entry.harness.harness_score)"></strong>
              <br>
              <small x-show="entry.harness">
                <span x-text="formatPct(entry.harness && entry.harness.valid_action_rate)"></span> valid
              </small>
            </td>
            <td x-text="entry.hands_played.toLocaleString()"></td>
            <td x-text="entry.sessions_played"></td>
          </tr>
        </template>
        <tr x-show="!data.entries || data.entries.length === 0">
          <td colspan="9" style="text-align:center; padding: 2rem; color: #999;">
            No runs yet. Be the first: <a href="https://github.com/holdem-agent-bench/holdem-agent-bench">install HAB</a>.
          </td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>HAB · MIT licensed · <a href="methodology.html">How is this scored?</a></p>
  </footer>

  <script src="assets/leaderboard.js"></script>
</body>
</html>
